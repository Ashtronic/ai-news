<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The State of AI — ainews.mavenotics.com</title>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,700;9..144,900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root { --ink: #1a1a1a; --accent: #c8341c; --paper: #f4efe6; --soft: #4a4540; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--paper); color: var(--ink); font-family: 'JetBrains Mono', monospace; min-height: 100vh; }
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      pointer-events: none;
      opacity: 0.4;
      background-image: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.008) 2px, rgba(0,0,0,0.008) 3px);
    }
    .wrap { max-width: 680px; margin: 0 auto; padding: 80px 32px; position: relative; z-index: 1; }
    .label { font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--accent); font-weight: 700; margin-bottom: 16px; }
    h1 { font-family: 'Fraunces', serif; font-size: 56px; font-weight: 900; line-height: 0.95; letter-spacing: -0.03em; margin-bottom: 8px; }
    .sub { font-size: 13px; color: var(--soft); margin-bottom: 40px; letter-spacing: 0.06em; }
    .btn-group { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 40px; }
    .btn { display: inline-block; padding: 14px 24px; font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase; text-decoration: none; font-weight: 700; transition: all 0.2s; white-space: nowrap; }
    .btn-primary { background: var(--ink); color: var(--paper); border: 1px solid var(--ink); }
    .btn-primary:hover { background: var(--accent); border-color: var(--accent); }
    .btn-secondary { background: transparent; color: var(--ink); border: 1px solid var(--ink); }
    .btn-secondary:hover { background: var(--ink); color: var(--paper); }
    .btn-accent { background: transparent; color: var(--accent); border: 1px solid var(--accent); }
    .btn-accent:hover { background: var(--accent); color: var(--paper); }
    .divider { border: none; border-top: 1px solid var(--ink); margin-bottom: 32px; }
    .archive-label { font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--soft); margin-bottom: 16px; }
    ul { list-style: none; }
    li { border-bottom: 1px solid rgba(26,26,26,0.12); }
    li a { display: block; padding: 16px 0; font-size: 13px; color: var(--ink); text-decoration: none; letter-spacing: 0.06em; transition: color 0.2s; }
    li a:hover { color: var(--accent); }
    li a::before { content: '→ '; color: var(--accent); }
    footer { margin-top: 48px; padding-top: 20px; border-top: 1px solid rgba(26,26,26,0.15); font-size: 10px; color: var(--soft); letter-spacing: 0.1em; text-transform: uppercase; }
    @media (max-width: 480px) {
      .wrap { padding: 48px 20px; }
      h1 { font-size: 40px; }
      .btn-group { flex-direction: column; }
      .btn { text-align: center; }
    }
  </style>
</head>
